##############################################################
# UNIFIX – Nginx Configuration
# Place at: /etc/nginx/sites-available/unifix
# Enable:   sudo ln -s /etc/nginx/sites-available/unifix /etc/nginx/sites-enabled/
# Reload:   sudo nginx -t && sudo systemctl reload nginx
##############################################################

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-domain.com www.your-domain.com;

    # ── SSL (Let's Encrypt / Certbot) ─────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN";
    add_header X-XSS-Protection      "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

    client_max_body_size 20M;

    # ── React Frontend (built static files) ───────────────────────
    root /var/www/unifix/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Flask API (proxied to Gunicorn) ───────────────────────────
    location /api/ {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # API routes accessed directly (no /api prefix)
    location ~ ^/(auth|issues|admin|dept|meta|lostfound|uploads)/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 20M;
    }

    # ── Uploaded files (served directly by Nginx) ─────────────────
    location /uploads/ {
        alias /var/www/unifix/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        # Restrict to allowed file types only
        location ~* \.(php|py|sh|exe)$ { deny all; }
    }

    # ── Logging ───────────────────────────────────────────────────
    access_log /var/log/nginx/unifix_access.log;
    error_log  /var/log/nginx/unifix_error.log;
}
